# 部署前：改 interface、ssid、wpa_passphrase
interface=wlan0
driver=nl80211
ssid=pc-hotspot
country_code=CN
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
ieee80211ax=1
ht_capab=[HT40+]
vht_capab=[SHORT-GI-80][MAX-MPDU-7991]
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=42
he_oper_chwidth=1
he_oper_centr_freq_seg0_idx=42
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=CHANGE_ME
ignore_broadcast_ssid=0
uapsd_advertisement_enabled=0
ieee80211w=1
beacon_int=100
dtim_period=1
wmm_enabled=1
ap_max_inactivity=300
disassoc_low_ack=1
multicast_to_unicast=0
